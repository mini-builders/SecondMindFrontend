<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecondMind</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #08080f;
      --surface:   #0f0f1a;
      --card:      #14141f;
      --border:    #1f1f30;
      --accent:    #7c6ef7;
      --accent-dim:#3d3778;
      --green:     #22c55e;
      --amber:     #f59e0b;
      --red:       #ef4444;
      --text:      #e2e8f0;
      --muted:     #4b5563;
      --sub:       #9ca3af;
      --radius:    14px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

    /* ═══════════════════════════════════════
       AUTH SCREEN
    ═══════════════════════════════════════ */
    .auth-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
      padding: 20px;
    }
    .auth-screen.hidden { display: none; }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%; max-width: 400px;
    }

    .auth-logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.25rem; font-weight: 700;
      margin-bottom: 28px; justify-content: center;
    }
    .auth-logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #7c6ef7, #a78bfa);
      border-radius: 11px; display: grid; place-items: center; font-size: 18px;
    }

    .auth-tabs {
      display: flex; gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1; padding: 9px;
      border: none; border-radius: 7px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; background: transparent; color: var(--sub);
      transition: all 0.15s;
    }
    .auth-tab.active { background: var(--accent); color: #fff; }

    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form.hidden { display: none; }

    .field-label {
      font-size: 12px; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 6px;
    }
    .field { display: flex; flex-direction: column; }

    .auth-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-input::placeholder { color: var(--muted); }

    .auth-submit {
      padding: 13px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
      transition: opacity 0.15s;
    }
    .auth-submit:hover { opacity: 0.88; }
    .auth-submit:disabled { opacity: 0.45; cursor: not-allowed; }

    .auth-error {
      font-size: 13px; color: var(--red);
      background: #1a0808; border: 1px solid #7f1d1d;
      border-radius: 8px; padding: 10px 14px;
      display: none;
    }
    .auth-error.show { display: block; }

    /* ═══════════════════════════════════════
       MAIN APP
    ═══════════════════════════════════════ */
    .app {
      display: none; width: 100%; height: 100vh;
    }
    .app.visible { display: flex; }

    /* Chat panel */
    .chat-panel {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
      border-right: 1px solid var(--border);
    }

    .chat-header {
      padding: 16px 22px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 1.05rem; font-weight: 700; }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #7c6ef7, #a78bfa);
      border-radius: 9px; display: grid; place-items: center; font-size: 14px;
    }

    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px 5px 8px;
      font-size: 13px; font-weight: 500;
    }
    .user-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent-dim); display: grid; place-items: center; font-size: 11px;
    }
    .logout-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-weight: 500;
      padding: 6px 12px; border-radius: 8px; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: all 0.15s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto; padding: 26px 22px;
      display: flex; flex-direction: column; gap: 18px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg-row { display: flex; gap: 10px; align-items: flex-start; animation: msgIn 0.2s ease; }
    .msg-row.user { flex-direction: row-reverse; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #7c6ef7, #a78bfa);
      border-radius: 9px; display: grid; place-items: center; font-size: 13px;
      flex-shrink: 0; margin-top: 2px;
    }

    .bubble {
      max-width: 74%; padding: 11px 15px;
      line-height: 1.6; font-size: 14px;
    }
    .bubble.ai     { background: var(--card); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; }
    .bubble.user   { background: var(--accent); color: #fff; border-radius: 14px 4px 14px 14px; }
    .bubble.conflict { background: #1a1008; border: 1px solid #78350f; border-radius: 4px 14px 14px 14px; color: #d97706; }
    .bubble.welcome { background: var(--surface); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; color: var(--sub); }

    /* Typing */
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
    .typing-dots span {
      width: 6px; height: 6px; background: var(--muted);
      border-radius: 50%; animation: blink 1.2s ease infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity:0.3; } 40% { opacity:1; } }

    /* Task chip */
    .task-chip {
      margin-top: 10px; margin-left: 40px;
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 10px; padding: 12px 14px; max-width: 74%;
    }
    .chip-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .chip-icon { font-size: 15px; }
    .chip-title { font-size: 13px; font-weight: 600; }
    .chip-type {
      margin-left: auto; font-size: 10px; font-weight: 500;
      padding: 2px 8px; border-radius: 20px;
      background: var(--accent-dim); color: #a78bfa; white-space: nowrap;
    }
    .chip-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip-tag { font-size: 11px; display: flex; align-items: center; gap: 4px; color: var(--sub); }
    .chip-tag.green  { color: var(--green); }
    .chip-tag.amber  { color: var(--amber); }
    .chip-tag.purple { color: #a78bfa; }

    /* Input */
    .input-area {
      padding: 14px 18px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0; background: var(--bg);
    }
    textarea {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 14px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5;
      resize: none; min-height: 46px; max-height: 120px;
      outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    .send-btn {
      width: 44px; height: 44px; background: var(--accent);
      border: none; border-radius: 11px; display: grid; place-items: center;
      cursor: pointer; color: #fff; font-size: 19px; flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Bell icon */
    .bell-wrapper { position: relative; }
    .bell-btn {
      position: relative;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 12px;
      cursor: pointer; font-size: 17px; color: var(--text);
      display: flex; align-items: center;
      transition: border-color 0.15s; font-family: 'Inter', sans-serif;
    }
    .bell-btn:hover { border-color: var(--accent); }
    .bell-badge {
      position: absolute; top: -5px; right: -5px;
      background: var(--red); color: #fff;
      font-size: 10px; font-weight: 700;
      min-width: 18px; height: 18px;
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
    }
    .bell-badge.hidden { display: none; }

    .bell-panel {
      position: absolute; top: calc(100% + 8px); right: 0;
      width: 310px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; z-index: 200;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      overflow: hidden; display: flex; flex-direction: column;
    }
    .bell-panel.hidden { display: none; }
    .bell-panel-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--muted);
      display: flex; align-items: center; justify-content: space-between;
    }
    .bell-panel-sub { color: var(--sub); font-size: 11px; text-transform: none; letter-spacing: 0; font-weight: 400; }

    .bell-notif-list {
      overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 8px;
      max-height: 380px;
    }
    .bell-notif-list::-webkit-scrollbar { width: 3px; }
    .bell-notif-list::-webkit-scrollbar-thumb { background: var(--border); }

    .notif-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 11px; padding: 12px; animation: msgIn 0.2s ease;
    }
    .notif-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .notif-icon-sm { font-size: 15px; }
    .notif-title { font-size: 13px; font-weight: 600; flex: 1; }
    .notif-time { font-size: 11px; color: var(--sub); margin-bottom: 8px; }
    .notif-tags { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .ntag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
    .ntag.retry   { background: #0d2d1a; color: var(--green); }
    .ntag.expires { background: #2d1a0d; color: var(--amber); }
    .ntag.once    { background: #1a1a2e; color: #a78bfa; }

    .ack-btn {
      width: 100%; padding: 7px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 7px; color: var(--sub);
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .ack-btn:hover { border-color: var(--green); color: var(--green); }

    .empty-notif {
      text-align: center; color: var(--muted);
      font-size: 13px; padding: 28px 12px; line-height: 1.7;
    }
  </style>
</head>
<body>

<!-- ═══════════════ AUTH SCREEN ═══════════════ -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🧠</div>
      SecondMind
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('signup')">Create Account</button>
      <button class="auth-tab" onclick="switchTab('login')">Log In</button>
    </div>

    <div class="auth-error" id="authError"></div>

    <!-- Sign Up -->
    <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
      <div class="field">
        <div class="field-label">Full Name</div>
        <input class="auth-input" type="text" id="signupName" placeholder="Manish Sharma" required />
      </div>
      <div class="field">
        <div class="field-label">Mobile Number</div>
        <input class="auth-input" type="tel" id="signupMobile" placeholder="9876543210" required />
      </div>
      <div class="field">
        <div class="field-label">Password</div>
        <input class="auth-input" type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" />
      </div>
      <button class="auth-submit" type="submit" id="signupBtn">Create Account</button>
    </form>

    <!-- Log In -->
    <form class="auth-form hidden" id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <div class="field-label">Mobile Number</div>
        <input class="auth-input" type="tel" id="loginMobile" placeholder="9876543210" required />
      </div>
      <div class="field">
        <div class="field-label">Password</div>
        <input class="auth-input" type="password" id="loginPassword" placeholder="Your password" required />
      </div>
      <button class="auth-submit" type="submit" id="loginBtn">Log In</button>
    </form>
  </div>
</div>

<!-- ═══════════════ MAIN APP ═══════════════ -->
<div id="mainApp" class="app">

  <!-- Chat -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="logo">
        <div class="logo-icon">🧠</div>
        SecondMind
      </div>
      <div class="header-right">
        <!-- Bell -->
        <div class="bell-wrapper" id="bellWrapper">
          <button class="bell-btn" onclick="toggleBell()" title="Reminders">
            🔔
            <span class="bell-badge hidden" id="bellBadge">0</span>
          </button>
          <div class="bell-panel hidden" id="bellPanel">
            <div class="bell-panel-header">
              Reminders
              <span class="bell-panel-sub" id="bellPanelSub"></span>
            </div>
            <div class="bell-notif-list" id="bellNotifList">
              <div class="empty-notif">No pending reminders.</div>
            </div>
          </div>
        </div>
        <div class="user-chip">
          <div class="user-avatar">👤</div>
          <span id="userNameDisplay"></span>
        </div>
        <button class="logout-btn" onclick="logout()">Log out</button>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <textarea id="taskInput" placeholder="What do you need to do? (e.g. Call Harshit at 3pm)" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="submitTask()" title="Send">↑</button>
    </div>
  </div>


</div>

<script>
  const API = '/api/v1';

  const ICONS = {
    communication: '📞', live_event: '🎯', medicine: '💊',
    meeting: '📅', errand: '🛒', personal: '✨',
  };
  const TYPE_COLORS = {
    communication: '#7c6ef7', live_event: '#f59e0b', medicine: '#22c55e',
    meeting: '#3b82f6', errand: '#f97316', personal: '#ec4899',
  };

  const CAT_ICONS = {
    Travel: '✈️', Health: '💊', Study: '📚', Work: '💼',
    Finance: '💰', Entertainment: '🎬', Social: '👥', Home: '🏠', Personal: '🧘',
  };
  const CAT_COLORS = {
    Travel: '#06b6d4', Health: '#22c55e', Study: '#8b5cf6', Work: '#3b82f6',
    Finance: '#f59e0b', Entertainment: '#ec4899', Social: '#f97316', Home: '#84cc16', Personal: '#a78bfa',
  };
  // lifecycle description per category for display
  const CAT_LIFECYCLE = {
    Travel:        '3× /hr · until done',
    Health:        '3× /hr · until done',
    Study:         '3× /hr · until done',
    Work:          '3× /hr · until done',
    Finance:       '6× over 12 hr · until done',
    Entertainment: '2× over 2 hr',
    Social:        'hourly · up to 2 days',
    Home:          'once',
    Personal:      'once',
  };

  // ── State (declared first to avoid TDZ errors in boot code) ──
  let token = localStorage.getItem('sm_token');
  let userName = localStorage.getItem('sm_user');
  let messages = [];
  let bellOpen = false;
  let _swReg = null;

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  }

  // ── Boot ──
  if (token) {
    showMainApp();
  } else {
    document.getElementById('authScreen').classList.remove('hidden');
  }

  // ── Auth tab switch ──
  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'signup')));
    document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
    document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
    clearAuthError();
  }

  function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearAuthError() {
    document.getElementById('authError').classList.remove('show');
  }

  // ── Signup ──
  async function handleSignup(e) {
    e.preventDefault();
    clearAuthError();
    const btn = document.getElementById('signupBtn');
    btn.disabled = true; btn.textContent = 'Creating account...';

    try {
      const res = await fetch(`${API}/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('signupName').value.trim(),
          mobile: document.getElementById('signupMobile').value.trim(),
          password: document.getElementById('signupPassword').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) { showAuthError(data.detail || 'Signup failed.'); return; }
      saveSession(data);
    } catch (_) {
      showAuthError('Cannot reach server.');
    } finally {
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }

  // ── Login ──
  async function handleLogin(e) {
    e.preventDefault();
    clearAuthError();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Logging in...';

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mobile: document.getElementById('loginMobile').value.trim(),
          password: document.getElementById('loginPassword').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) { showAuthError(data.detail || 'Login failed.'); return; }
      saveSession(data);
    } catch (_) {
      showAuthError('Cannot reach server.');
    } finally {
      btn.disabled = false; btn.textContent = 'Log In';
    }
  }

  function saveSession(data) {
    token = data.access_token;
    userName = data.user_name;
    localStorage.setItem('sm_token', token);
    localStorage.setItem('sm_user', userName);
    showMainApp();
  }

  function logout() {
    localStorage.removeItem('sm_token');
    localStorage.removeItem('sm_user');
    token = null; userName = null;
    messages = [];
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.remove('visible');
  }

  function showMainApp() {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.add('visible');
    document.getElementById('userNameDisplay').textContent = userName || 'User';
    messages = [];
    addMessage({ type: 'welcome', text: `Hey ${userName ? userName.split(' ')[0] : 'there'}! I'm your second mind. Tell me what you need to do — I'll remember it and remind you at the right time.` });
    updateCount();
    setupPush();
    handleUrlParams();
  }

  // ════════════════════════════════════════
  //  CHAT
  // ════════════════════════════════════════

  function addMessage(msg) {
    msg.id = Date.now() + Math.random();
    messages.push(msg);
    renderMessages();
    scrollToBottom();
    return msg.id;
  }

  function removeMessage(id) {
    messages = messages.filter(m => m.id !== id);
    renderMessages();
  }

  function renderMessages() {
    document.getElementById('messages').innerHTML = messages.map(renderMsg).join('');
  }

  function renderMsg(msg) {
    if (msg.type === 'user') return `
      <div class="msg-row user">
        <div class="bubble user">${escHtml(msg.text)}</div>
      </div>`;

    if (msg.type === 'typing') return `
      <div class="msg-row ai">
        <div class="avatar">🧠</div>
        <div class="bubble ai"><div class="typing-dots"><span></span><span></span><span></span></div></div>
      </div>`;

    if (msg.type === 'ai') return `
      <div class="msg-row ai">
        <div class="avatar">🧠</div>
        <div>
          <div class="bubble ai">${escHtml(msg.text)}</div>
          ${msg.task ? renderTaskChip(msg.task) : ''}
        </div>
      </div>`;

    if (msg.type === 'conflict') return `
      <div class="msg-row ai">
        <div class="avatar">🧠</div>
        <div class="bubble conflict">${escHtml(msg.text)}</div>
      </div>`;

    if (msg.type === 'welcome') return `
      <div class="msg-row ai">
        <div class="avatar">🧠</div>
        <div class="bubble welcome">${escHtml(msg.text)}</div>
      </div>`;

    return '';
  }

  function renderTaskChip(task) {
    const notif    = task.notification;
    const category = task.category || 'Personal';
    const catIcon  = CAT_ICONS[category] || '📌';
    const catColor = CAT_COLORS[category] || 'var(--accent)';
    const lifecycle = CAT_LIFECYCLE[category] || '';

    const time = task.scheduled_time
      ? `<span class="chip-tag purple">🕐 ${formatDT(task.scheduled_time)}</span>`
      : `<span class="chip-tag">No specific time</span>`;
    const expiry = notif.expires && notif.expires_at
      ? `<span class="chip-tag amber">⏳ until ${formatDT(notif.expires_at)}</span>` : '';

    return `<div class="task-chip" style="border-left-color:${catColor}">
      <div class="chip-top">
        <span class="chip-icon">${catIcon}</span>
        <span class="chip-title">${escHtml(task.title)}</span>
        <span class="chip-type" style="background:${catColor}22;color:${catColor}">${category}</span>
      </div>
      <div class="chip-meta">
        ${time}
        <span class="chip-tag" style="color:${catColor}">🔔 ${lifecycle}</span>
        ${expiry}
      </div>
    </div>`;
  }

  async function submitTask() {
    const input = document.getElementById('taskInput');
    const text  = input.value.trim();
    if (!text) return;

    addMessage({ type: 'user', text });
    input.value = ''; autoResize(input);

    const tid = addMessage({ type: 'typing' });
    document.getElementById('sendBtn').disabled = true;

    try {
      const res = await fetch(`${API}/tasks/parse`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ text }),
      });
      const data = await res.json();
      removeMessage(tid);

      if (res.status === 401) { logout(); return; }

      if (res.status === 409) {
        addMessage({ type: 'conflict', text: `Hmm, you already have "${data.detail.conflicting_task_title}" around that time. I didn't save this one — want to pick a different time?` });
        return;
      }
      if (!res.ok) {
        addMessage({ type: 'conflict', text: data.detail || 'Something went wrong. Try again.' });
        return;
      }

      addMessage({ type: 'ai', text: `Task saved! I've noted "${data.title}"${data.scheduled_time ? ' at ' + formatDT(data.scheduled_time) : ''}.`, task: data });
      await updateCount();

    } catch (_) {
      removeMessage(tid);
      addMessage({ type: 'conflict', text: 'Could not reach the server. Is it running?' });
    } finally {
      document.getElementById('sendBtn').disabled = false;
    }
  }

  // ════════════════════════════════════════
  //  BELL + NOTIFICATIONS
  // ════════════════════════════════════════

  async function toggleBell() {
    bellOpen = !bellOpen;
    const panel = document.getElementById('bellPanel');
    panel.classList.toggle('hidden', !bellOpen);
    if (bellOpen) await openBell();
  }

  async function openBell() {
    if (!token) return;
    try {
      const res = await fetch(`${API}/notifications`, { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      const list = await res.json();
      renderBellNotifs(list);
      setBadge(list.length);
    } catch (_) {}
  }

  function renderBellNotifs(list) {
    const container = document.getElementById('bellNotifList');
    const sub       = document.getElementById('bellPanelSub');

    if (!list.length) {
      container.innerHTML = '<div class="empty-notif">All clear! Nothing pending.</div>';
      sub.textContent = '';
      return;
    }

    sub.textContent = `${list.length} pending`;
    container.innerHTML = list.map(n => {
      const nid       = n._id || n.id;
      const category  = n.category || 'Personal';
      const catIcon   = CAT_ICONS[category] || '🔔';
      const catColor  = CAT_COLORS[category] || '#7c6ef7';
      const lifecycle = CAT_LIFECYCLE[category] || '';
      const expTag    = n.expires && n.expires_at
        ? `<span class="ntag expires">⏳ until ${formatDT(n.expires_at)}</span>` : '';
      return `<div class="notif-card" id="notif-${nid}">
        <div class="notif-top">
          <span class="notif-icon-sm">${catIcon}</span>
          <span class="notif-title">${escHtml(n.task_title)}</span>
          <span class="ntag" style="background:${catColor}22;color:${catColor};margin-left:auto">${category}</span>
        </div>
        <div class="notif-time">${n.scheduled_at ? formatDT(n.scheduled_at) : 'Anytime'}</div>
        <div class="notif-tags">
          <span class="ntag retry">🔔 ${lifecycle}</span>
          ${expTag}
        </div>
        <button class="ack-btn" onclick="acknowledgeNotif('${nid}')">Got it ✓</button>
      </div>`;
    }).join('');
  }

  async function acknowledgeNotif(id) {
    const card = document.getElementById(`notif-${id}`);
    if (card) { card.style.opacity = '0.4'; card.style.pointerEvents = 'none'; }
    await fetch(`${API}/notifications/${id}/acknowledge`, { method: 'PATCH', headers: authHeaders() });
    await updateCount();
    if (bellOpen) await openBell();
  }

  async function updateCount() {
    if (!token) return;
    try {
      const res = await fetch(`${API}/notifications/count`, { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      const { count } = await res.json();
      setBadge(count);
    } catch (_) {}
  }

  function setBadge(count) {
    const badge = document.getElementById('bellBadge');
    if (count > 0) {
      badge.textContent = count > 99 ? '99+' : count;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  }

  // Close bell when clicking outside
  document.addEventListener('click', e => {
    if (bellOpen && !document.getElementById('bellWrapper').contains(e.target)) {
      bellOpen = false;
      document.getElementById('bellPanel').classList.add('hidden');
    }
  });

  // ── Helpers ──
  function formatDT(iso) {
    return new Date(iso).toLocaleString('en-IN', {
      day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: true,
    });
  }
  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function scrollToBottom() {
    const el = document.getElementById('messages');
    setTimeout(() => el.scrollTop = el.scrollHeight, 50);
  }
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  document.getElementById('taskInput').addEventListener('input', function () { autoResize(this); });
  document.getElementById('taskInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitTask(); }
  });

  setInterval(updateCount, 30000);

  // ════════════════════════════════════════
  //  SERVICE WORKER + WEB PUSH
  // ════════════════════════════════════════

  async function setupPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
      _swReg = await navigator.serviceWorker.register('/sw.js');
      // Pass token to SW so it can call the acknowledge endpoint from notification actions
      if (_swReg.active) {
        _swReg.active.postMessage({ type: 'SET_TOKEN', token });
      }
      navigator.serviceWorker.ready.then(reg => {
        reg.active && reg.active.postMessage({ type: 'SET_TOKEN', token });
      });

      // Ask permission and subscribe if not already
      const existing = await _swReg.pushManager.getSubscription();
      if (existing) return; // already subscribed

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') return;

      await subscribeToPush(_swReg);
    } catch (err) {
      console.warn('Push setup error:', err);
    }
  }

  async function subscribeToPush(reg) {
    try {
      const keyRes = await fetch(`${API}/push/vapid-public-key`);
      const { public_key } = await keyRes.json();
      const applicationServerKey = urlBase64ToUint8Array(public_key);

      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey,
      });

      const subJson = sub.toJSON();
      await fetch(`${API}/push/subscribe`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({
          endpoint: subJson.endpoint,
          keys: { p256dh: subJson.keys.p256dh, auth: subJson.keys.auth },
        }),
      });
      console.log('Push subscription saved');
    } catch (err) {
      console.warn('Push subscribe error:', err);
    }
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const raw = window.atob(base64);
    return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
  }

  // Open bell automatically if URL has ?bell=1 (e.g. from push notification tap)
  function handleUrlParams() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('bell') === '1') {
      history.replaceState({}, '', '/');
      setTimeout(() => { bellOpen = false; toggleBell(); }, 400);
    }
  }
</script>
